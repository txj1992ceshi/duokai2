name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag / version label, e.g. v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npm run install:chromium

      - name: Build Windows installer
        run: npm run build

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $exe = Get-ChildItem -Path release -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw 'Windows installer (.exe) not found under release/' }
          Copy-Item $exe.FullName (Join-Path $PWD 'release-assets/Duokai2 Setup.exe') -Force

          $zip = Get-ChildItem -Path release -Recurse -Filter *.zip |
            Where-Object { $_.Name -notmatch 'mac' } |
            Select-Object -First 1
          if (-not $zip) { throw 'Windows zip package not found under release/' }
          Copy-Item $zip.FullName (Join-Path $PWD 'release-assets/Duokai2-win.zip') -Force

      - name: Upload Actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duokai2-windows-installer
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/Duokai2 Setup.exe
            release-assets/Duokai2-win.zip
